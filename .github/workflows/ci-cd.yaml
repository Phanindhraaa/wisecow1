name: CI/CD – Build, Push & Deploy Wisecow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:           # allow manual runs

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/wisecow

# ──────────────────────────────────────────────────────────────────────────────
jobs:
# ──────────────────────────────────────────────────────────────────────────────

  # ── 1. Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint Dockerfile & Shell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: Lint shell scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck wisecow.sh scripts/*.sh

  # ── 2. Build & Push Docker image ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy to Kubernetes ───────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    # Only deploy on pushes to main (not PRs)
    if: github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Write the kubeconfig stored as a GitHub secret to disk
      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      # Ensure the wisecow-tls secret exists (idempotent)
      - name: Apply TLS secret (from GitHub Secret)
        run: |
          kubectl create namespace wisecow --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret tls wisecow-tls \
            --cert=<(echo "${{ secrets.TLS_CERT }}" | base64 --decode) \
            --key=<(echo "${{ secrets.TLS_KEY }}"  | base64 --decode) \
            --namespace=wisecow \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa.yaml

      # Patch the deployment with the exact image SHA so the rollout is
      # deterministic and auditable.
      - name: Update deployment image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.image-digest }}"
          kubectl set image deployment/wisecow \
            wisecow="$IMAGE" \
            --namespace=wisecow

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/wisecow \
            --namespace=wisecow \
            --timeout=120s

      - name: Show pod status
        run: kubectl get pods -n wisecow -o wide
